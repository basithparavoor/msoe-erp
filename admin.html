<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Administrator Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header><div class="logo">MA'DIN SCHOOL — ERP Demo</div><div class="flex"><div class="small">Students: 150 | Teachers: 5 | Batches: 8</div><div style="margin-left:16px"><button id="resetBtn" class="btn ghost">Reset Data</button></div></div></header>
  <div class="container">
    
    <nav><a href="index.html">Home</a><a href="admin.html">Admin</a></nav>
    
    
<div class="card"><h2>Administrator Dashboard</h2></div>
<div class="card">
  <h3>Manage Students</h3>
  <div class="grid">
    <div><label>Name</label><input id="new_name"/></div>
    <div><label>Batch</label><input id="new_batch"/></div>
    <div><label>Grade</label><input id="new_grade"/></div>
  </div>
  <div style="margin-top:8px"><button class="btn" id="addStudent">Add Student</button></div>
  <hr/>
  <h3>All Data</h3>
  <div id="allData" class="small"></div>
</div>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  try{
    const auth = JSON.parse(localStorage.getItem('madin_demo_auth'));
    if(!auth){ location.href='auth.html'; return; }
    const allowed = ['Administrator'];
    if(!allowed.includes(auth.role)){
      alert('Access denied for role: ' + auth.role);
      const map = { Student:'student.html', Parent:'parent.html', Teacher:'teacher.html', Administrator:'admin.html', Judge:'judge.html', FestController:'festcontroller.html' };
      location.href = map[auth.role] || 'index.html';
    }
  }catch(e){ location.href='auth.html'; }
});
</script>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  function refresh(){
    const s = state();
    document.getElementById('allData').innerHTML = `<div><strong>Students</strong> (${s.students.length})</div><div><strong>Teachers</strong> (${s.teachers.length})</div><div><strong>Fest Competitions</strong> (${s.fest.competitions.length})</div>`;
  }
  document.getElementById('addStudent').addEventListener('click', ()=>{
    const s = state(); const nid = 'S'+(100+Date.now()%10000);
    const name = document.getElementById('new_name').value.trim(); if(!name){alert('Enter name');return}
    s.students.push({id:nid,name, batch: document.getElementById('new_batch').value || 'Batch X', present:false, profile:{age:0,grade:document.getElementById('new_grade').value||''}, leaves:[], competitions:[]});
    setState(s); refresh(); alert('Student added: '+nid);
  });
  refresh();
});
</script>

  </div>
  <footer>Demo multipage static site — data in localStorage</footer>
  <script src="app.js"></script>
  

<hr/>
<h3>Manage Accounts (Reset / Edit Passwords)</h3>
<div class="card">
  <div id="accountsList" class="small"></div>
</div>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  // require admin role
  if(!isAuthenticated()) { location.href='auth.html'; return; }
  const auth = currentAuth();
  if(auth.role !== 'Administrator'){ alert('Access denied'); location.href='index.html'; return; }

  function renderAccounts(){
    const s = state();
    const users = s.users || {};
    const rows = Object.keys(users).map(u=>{
      const info = users[u];
      return `<div style="padding:8px;border:1px solid #eef4fb;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:8px"><div style="min-width:180px"><strong>${u}</strong><div class="small">${info.role} — ${info.idRef || ''}</div></div><div style="flex:1"><input placeholder="New password" id="pw_${u}" /></div><div><button class="btn" data-user="${u}" data-act="reset">Reset</button> <button class="btn ghost" data-user="${u}" data-act="delete">Delete</button></div></div>`;
    }).join('') || '<i>No users</i>';
    document.getElementById('accountsList').innerHTML = rows;
    // attach handlers
    document.querySelectorAll('button[data-act="reset"]').forEach(b=> b.onclick = (e)=> {
      const uname = e.target.dataset.user;
      const inp = document.getElementById('pw_' + uname);
      const np = inp.value.trim();
      if(!np){ alert('Enter new password'); return; }
      const res = updateUserPassword(uname, np);
      if(res.ok){ alert('Password updated for ' + uname); inp.value=''; } else alert('Error: ' + res.error);
      renderAccounts();
    });
    document.querySelectorAll('button[data-act="delete"]').forEach(b=> b.onclick = (e)=> {
      const uname = e.target.dataset.user;
      if(!confirm('Delete user ' + uname + '? This will remove login only, not the student/parent record.')) return;
      const res = deleteUser(uname);
      if(res.ok){ alert('Deleted ' + uname); } else alert('Error: ' + res.error);
      renderAccounts();
    });
  }
  renderAccounts();
});
</script>

</body>
</html>
