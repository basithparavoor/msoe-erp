<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — MA'DIN ERP Demo</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-box{max-width:420px;margin:40px auto}
    .hint{background:#fffbe6;padding:10px;border-radius:8px;border:1px solid #fff0b3}
  </style>
</head>
<body>
  <header><div class="logo">MA'DIN SCHOOL — ERP Demo</div></header>
  <div class="container login-box">
    <div class="card">
      <h2>Sign in</h2>
            <script>
      document.addEventListener("DOMContentLoaded", ()=>{
        const s = state();
        const users = s.users || {};
        let html = "<ul style='margin-left:16px'>";
        Object.keys(users).slice(0,50).forEach(k=>{
          html += `<li><strong>${k}</strong> / ${users[k].password} — ${users[k].role}</li>`;
        });
        html += "</ul>";
        document.getElementById('demoCreds').innerHTML = html;
      });
      </script>

      <div><label>Username</label><input id="username" /></div>
      <div><label>Password</label><input id="password" type="password" /></div>
      <div style="margin-top:8px"><label><input type="checkbox" id="remember_me" /> Remember me</label> <button id="showPass" class="btn ghost" style="padding:4px 8px;margin-right:8px">Show</button></div>
      <div style="margin-top:8px"><button class="btn" id="loginBtn">Sign In</button></div>
  </div>
  <footer>Demo multipage static site — data in localStorage</footer>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', ()=>{
      document.getElementById('loginBtn').addEventListener('click', ()=>{
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const remember = !!document.getElementById('remember_me').checked;
        const res = signIn(u,p, remember);
        if(!res.ok){ alert(res.error); return; }
        // redirect based on role
        const role = res.payload.role;
        const map = { Student:'student.html', Parent:'parent.html', Teacher:'teacher.html', Administrator:'admin.html', Judge:'judge.html', FestController:'festcontroller.html' };
        location.href = map[role] || 'index.html';
      });
    });
  document.getElementById('showPass').addEventListener('click', ()=>{ const inp = document.getElementById('password'); if(inp.type==='password'){ inp.type='text'; document.getElementById('showPass').textContent='Hide'; } else { inp.type='password'; document.getElementById('showPass').textContent='Show'; }});
</script>
</body>
</html>
