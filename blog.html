<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Campus Blog</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header><div class="logo">MA'DIN SCHOOL — ERP Demo</div><div class="flex"><div class="small">Students: 150 | Teachers: 5 | Batches: 8</div><div style="margin-left:16px"><button id="resetBtn" class="btn ghost">Reset Data</button></div></div></header>
  <div class="container">
    
    <nav><a href="index.html">Home</a><a href="blog.html">Blog</a></nav>
    
    
<div class="card"><h2>Campus Blog</h2></div>
<div class="card">
  <h3>Write an Update (demo, saved to localStorage)</h3>
  <div><label>Title</label><input id="post_title"/></div>
  <div><label>Content</label><textarea id="post_content"></textarea></div>
  <div style="margin-top:8px"><button class="btn" id="addPost">Add Post</button></div>
</div>
<div class="card">
  <h3>Posts</h3>
  <div id="posts" class="small"></div>
</div>
<script>
document.addEventListener('DOMContentLoaded', ()=>{ const auth = currentAuth(); if(!auth){ document.getElementById('addPost').disabled=true; document.getElementById('post_title').placeholder='Sign in to post'; document.getElementById('post_content').placeholder='Sign in to post'; }
  function refresh(){
    const s = state(); const posts = s.posts || []; document.getElementById('posts').innerHTML = posts.map(p=>`<div style='padding:8px;border:1px solid #eef4fb;border-radius:8px;margin-bottom:6px'><strong>${p.title}</strong><div class='small'>${formatDate(p.at)} — ${p.author ? 'by '+p.author : ''}</div><div style='margin-top:6px'>${p.content}</div></div>`).join('')||'<i>No posts</i>';
  }
  document.getElementById('addPost').addEventListener('click', ()=>{
    const title = document.getElementById('post_title').value.trim(); const content = document.getElementById('post_content').value.trim(); if(!title||!content){alert('Title & content required');return}
    const s = state(); s.posts = s.posts || []; s.posts.unshift({title, content, at:new Date().toISOString(), author: currentAuth() ? currentAuth().username : 'Guest'}); setState(s); document.getElementById('post_title').value=''; document.getElementById('post_content').value=''; refresh();
  });
  refresh();
});
</script>

  </div>
  <footer>Demo multipage static site — data in localStorage</footer>
  <script src="app.js"></script>
  
</body>
</html>
